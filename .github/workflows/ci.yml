name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install rapidfuzz pandas python-dotenv pydantic

    - name: Run tests
      env:
        OPENAI_API_KEY: "test-key"
        OPENAI_BASE_URL: "https://hk.ticketpro.cc/v1"
      run: |
        pytest tests/ -v --tb=short --ignore=tests/test_integration.py

    - name: Upload coverage
      if: matrix.python-version == '3.11'
      run: |
        pip install pytest-cov
        pytest tests/unit/ -v --cov=agent --cov-report=term-missing
